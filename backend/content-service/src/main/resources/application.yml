server:
  port: 8082

spring:
  application:
    name: content-service
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: jdbc:postgresql://localhost:5433/diplom_db
    username: admin
    password: adminpassword
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.default_schema: content_schema
  flyway:
    schemas: content_schema
    default-schema: content_schema

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

user-service:
  base-url: ${USER_SERVICE_URL:http://localhost:8081}

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

app:
  uploads:
    dir: ${UPLOADS_DIR:/app/uploads}
