server:
  port: 8084

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

spring:
  application:
    name: billing-service
  profiles:
    active: local

  jackson:
    serialization:
      write-dates-as-timestamps: false

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  datasource:
    url: jdbc:postgresql://localhost:5433/diplom_db
    username: admin
    password: adminpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate.default_schema: billing_schema

  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: billing_schema
    default-schema: billing_schema
    create-schemas: true

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

billing:
  payment:
    provider: stub
    intent-ttl-minutes: 60
    stub:
      confirm-base-url: http://localhost:8084
      webhook-secret: stub-secret
  jobs:
    expire-subscriptions-cron: "0 0 * * * *"
    expire-stale-transactions-cron: "0 */15 * * * *"
