server:
  port: 8081 # Устанавливаем отдельный порт для сервиса, чтобы не конфликтовать с Gateway

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

spring:
  application:
    name: user-service

  jackson:
    serialization:
      write-dates-as-timestamps: false

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  datasource:
    url: jdbc:postgresql://localhost:5433/diplom_db
    username: admin
    password: adminpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate # Используем Flyway, поэтому hibernate не должен менять схему
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: user_schema
    default-schema: user_schema
    create-schemas: true

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration-hours: 24
