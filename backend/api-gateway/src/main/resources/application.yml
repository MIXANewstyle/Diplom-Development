server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service-users
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/users/**
        - id: user-service-admin
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/admin/users/**
        - id: user-service-social
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/social/**
        - id: content-service-uploads
          uri: ${CONTENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/uploads/**
        - id: content-service-posts
          uri: ${CONTENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/posts/**
        - id: content-service-feed
          uri: ${CONTENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/feed
        - id: content-service-tags
          uri: ${CONTENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/tags/**
        - id: content-service-comments
          uri: ${CONTENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/comments/**
        - id: content-service-authors-posts
          uri: ${CONTENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/authors/*/posts
        - id: content-service-admin-posts
          uri: ${CONTENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/internal/v1/admin/posts/**
        - id: content-service-admin-tags
          uri: ${CONTENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/internal/v1/admin/tags/**
        - id: content-service-admin-comments
          uri: ${CONTENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/internal/v1/admin/comments/**
        - id: chat-service-rooms
          uri: ${CHAT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/rooms/**
        - id: chat-service-invites
          uri: ${CHAT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/invites/**
        - id: chat-service-ws
          uri: ${CHAT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/ws/**
        - id: chat-service-admin-rooms
          uri: ${CHAT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/internal/v1/admin/rooms/**
        - id: chat-service-admin-llm
          uri: ${CHAT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/internal/v1/admin/llm/**
        - id: billing-service-admin
          uri: ${BILLING_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/admin/billing/**
        - id: billing-service
          uri: ${BILLING_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/billing/**
