server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service-users
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/users/**
        - id: user-service-admin
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/admin/users/**
        - id: user-service-social
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/social/**
        - id: content-service-posts
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/posts/**
        - id: content-service-feed
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/feed
        - id: content-service-tags
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/tags/**
        - id: content-service-comments
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/comments/**
        - id: content-service-authors-posts
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/authors/*/posts
        - id: content-service-admin-posts
          uri: http://localhost:8082
          predicates:
            - Path=/internal/v1/admin/posts/**
        - id: content-service-admin-tags
          uri: http://localhost:8082
          predicates:
            - Path=/internal/v1/admin/tags/**
        - id: content-service-admin-comments
          uri: http://localhost:8082
          predicates:
            - Path=/internal/v1/admin/comments/**
        - id: chat-service-rooms
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/rooms/**
        - id: chat-service-ws
          uri: http://localhost:8083
          predicates:
            - Path=/ws/**
        - id: chat-service-admin-rooms
          uri: http://localhost:8083
          predicates:
            - Path=/internal/v1/admin/rooms/**
        - id: chat-service-admin-llm
          uri: http://localhost:8083
          predicates:
            - Path=/internal/v1/admin/llm/**
        - id: billing-service-admin
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/admin/billing/**
        - id: billing-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/billing/**
